version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kistogramm_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/kistogramm
      - SPRING_DATASOURCE_USERNAME=kisto_user
      - SPRING_DATASOURCE_PASSWORD=secret
      - AI_UPLOAD_DIR=/uploads
      - AI_WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me-in-production}
    volumes:
      - ai_uploads:/uploads
    networks:
      - kistonet

  db:
    image: postgres:16
    container_name: kistogramm_db
    restart: always
    environment:
      POSTGRES_DB: kistogramm
      POSTGRES_USER: kisto_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kistonet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kisto_user -d kistogramm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kistogramm_redis
    restart: always
    networks:
      - kistonet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    container_name: kistogramm_ai_worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - ai_uploads:/uploads
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CALLBACK_URL=http://app:8080/api/ai/webhook/result
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me-in-production}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - VLM_MODEL=qwen2.5vl:7b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kistonet

  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    container_name: kistogramm_monitor
    ports:
      - "8888:8888"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - APP_URL=http://app:8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OLLAMA_URL=http://host.docker.internal:11434
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me-in-production}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ai_uploads:/uploads:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kistonet

volumes:
  pgdata:
  ai_uploads:

networks:
  kistonet:
