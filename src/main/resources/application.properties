spring.application.name=Kistogramm
spring.config.import=classpath:config/default-categories.yml
# let the active profile be overwritten by the Maven Build Process
spring.profiles.active=@springProfile@
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging
logging.level.root=WARN
logging.level.de.iske.kistogramm=INFO
logging.level.org.springframework.boot.web.embedded=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %-30.30logger{0} : %msg%n

# AI pipeline
ai.upload-dir=/uploads
ai.webhook-secret=change-me-in-production

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always